<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/bootstrap.min.css">
	<link rel="stylesheet" href="css/style.css">
	<meta charset="UTF-8">
	<title>data analysis</title>
</head>
<body>
    <div class="container wrapper">
        <h2>the office: data analysis</h2>
        <div class = "row analysis">
            <p>text here!</p>
        </div>
        <div class="row justify-content-center">
            <div class = "col-6">
                <h4>rating by episode</h4>
                <div class = "row analysis">
                    <p>the following graph shows IMDB ratings by episode. filter by season. hover over a point for more episode info.</p>
                </div>
            </div>
            <div class="col-6">
                <h4>speakers per episode</h4>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-2">
                <label for="season-filter">Season:</label>
                <select class="form-control" id="season-filter" onchange="seasonChanged()">
                    <option value="all">All</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class = "col-6">
                <div id="line-chart"></div>
            </div>
            <div class="col-6">
                <div id="p-chart"></div>
            </div>
        </div>
    </div>
<!--OS JS-->
    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/d3.min.js"></script>
    <script src="js/d3-tip.js"></script>
    <script src="js/d3-interpolate-path.js"></script>
<!--My JS-->
    <script src="js/main.js"></script>
    <script src="js/linechart.js"></script>
    <script src="js/percentchart.js"></script>
</body>
</html>
